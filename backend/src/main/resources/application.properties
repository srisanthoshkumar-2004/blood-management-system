spring.application.name=BloodManagementSystem

# 🗄️ Database Configuration (Production - Strictly Environment Variables)
# Mandatory Variables: DB_URL, DB_USER, DB_PASS
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 🛠️ JPA / Hibernate (Production Optimized)
# Keep 'update' for first deploy, then change to 'validate' for maximum stability.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ⚡ Connection Pool (HikariCP - Tuned for Aiven)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# 🔐 Security (JWT) - 15 Minute Access Expiration
# Mandatory Variable: JWT_SECRET (Strictly no default!)
jwt.secret=${JWT_SECRET}
jwt.expiration=900000

# 📱 Twilio (SMS & IVR)
# Mandatory Variables: TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN, TWILIO_PHONE_NUMBER
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# 🌐 CORS & Integration (Production URLs)
# Mandatory Variables: FRONTEND_URL, BACKEND_URL
frontend.url=${FRONTEND_URL}
app.backend-url=${BACKEND_URL}

# 🛡️ Production Security Hardening
server.error.include-stacktrace=never
server.error.include-message=always
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.timeout=30m

# 🚀 Performance & Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# 📝 Logging (Production - Reduced Output)
logging.level.root=INFO
logging.level.com.bms=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=ERROR
