spring.application.name=BloodManagementSystem

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/blood_management?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:${DB_USERNAME:root}}
spring.datasource.password=${DB_PASS:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# Security (JWT) - 15 Minute Access Expiration
jwt.secret=${JWT_SECRET:verysecretkeythatneedstobelongenoughforhs256signatureverification12345}
jwt.expiration=900000

# Twilio (SMS & IVR)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# Frontend & Backend URL Configuration
frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend-url=${BACKEND_URL:http://localhost:8080}

# Production Security
server.error.include-stacktrace=never
server.error.include-message=always
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# Logging
logging.level.root=INFO
logging.level.com.bms=DEBUG
logging.level.org.springframework.security=INFO
