version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: bms-db
    restart: always
    environment:
      MYSQL_DATABASE: blood_management
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: bms_user
      MYSQL_PASSWORD: bms_password
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bms-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/blood_management?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: bms_user
      SPRING_DATASOURCE_PASSWORD: bms_password
      JWT_SECRET: local_test_secret_64_characters_long_minimum_required_for_hs256
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-your_sid_here}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-your_token_here}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-your_num_here}
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend # You would need a separate one or Vite dev
    container_name: bms-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    profiles:
      - dev-only
